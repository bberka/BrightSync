name: Build and Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - VERSION
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest

    env:
      PROJECT_PATH: src/BrightSync.csproj
      CONFIGURATION: Release
      RID: win-x64
      ARTIFACT_SUFFIX: windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "VERSION file is empty."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP "${{ env.ARTIFACT_SUFFIX }}"
          $publishArgs = @(
            'publish',
            '${{ env.PROJECT_PATH }}',
            '-c', '${{ env.CONFIGURATION }}',
            '-r', '${{ env.RID }}',
            '-p:DebugType=None',
            '-p:DebugSymbols=false',
            '-p:Version=${{ steps.version.outputs.version }}',
            '-p:AssemblyVersion=${{ steps.version.outputs.version }}',
            '-p:FileVersion=${{ steps.version.outputs.version }}',
            '-p:InformationalVersion=${{ steps.version.outputs.version }}',
            '-o', $publishDir
          )

          dotnet @publishArgs

      - name: Archive publish output
        id: archive
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $zipName = "BrightSync-$version-${{ env.ARTIFACT_SUFFIX }}.zip"
          $publishDir = Join-Path $env:RUNNER_TEMP "${{ env.ARTIFACT_SUFFIX }}"
          $zipPath = Join-Path $env:RUNNER_TEMP $zipName

          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $publishDir '*') -DestinationPath $zipPath
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Build Installer (Inno Setup)
        id: installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $publishDir = Join-Path $env:RUNNER_TEMP "${{ env.ARTIFACT_SUFFIX }}"
          
          # Compile the installer using ISCC (pre-installed and in PATH on GitHub windows runners)
          iscc `
            /dAppVersion=$version `
            "/dPublishDir=$publishDir" `
            /O"$env:RUNNER_TEMP" `
            installer/installer.iss
            
          $setupPath = Join-Path $env:RUNNER_TEMP "BrightSync-Setup-v$version.exe"
          if (!(Test-Path $setupPath)) {
            throw "Setup executable was not created."
          }
          
          "setup_path=$setupPath" >> $env:GITHUB_OUTPUT

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $title = "$tag"

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --repo $env:GITHUB_REPOSITORY `
              --title $title `
              --notes "Automated release for version $tag."
          }

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" `
            "${{ steps.archive.outputs.zip_path }}" `
            "${{ steps.installer.outputs.setup_path }}" `
            --repo $env:GITHUB_REPOSITORY `
            --clobber
