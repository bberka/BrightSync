name: Build and Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - VERSION
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest

    env:
      PROJECT_PATH: src/BrightSync.csproj
      CONFIGURATION: Release
      RID: win-x64
      ARTIFACT_SUFFIX: windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "VERSION file is empty"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c ${{ env.CONFIGURATION }}
          -r ${{ env.RID }}
          /p:Version=${{ steps.version.outputs.version }}

      - name: Locate publish directory
        id: locate
        shell: pwsh
        run: |
          $publishDir = (Get-ChildItem -Path "src" -Filter "publish" -Recurse -Directory).FullName |
            Select-Object -First 1
          if (-not $publishDir) {
            throw "Could not find publish directory"
          }
          "publish_dir=$publishDir" >> $env:GITHUB_OUTPUT

      - name: Inspect publish output
        shell: pwsh
        run: |
          $publishDir = "${{ steps.locate.outputs.publish_dir }}"
          Write-Host "Publish directory: $publishDir"
          Get-ChildItem $publishDir | Format-Table Name, Length -AutoSize
          $exe = Join-Path $publishDir "BrightSync.exe"
          if (Test-Path $exe) {
            Write-Host "BrightSync.exe size: $((Get-Item $exe).Length) bytes"
          } else {
            throw "BrightSync.exe not found in publish directory"
          }

      - name: Archive publish output
        id: archive
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $zipName = "BrightSync-$version-${{ env.ARTIFACT_SUFFIX }}.zip"
          $publishDir = "${{ steps.locate.outputs.publish_dir }}"
          $zipPath = Join-Path $env:RUNNER_TEMP $zipName

          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $publishDir '*') -DestinationPath $zipPath
          Write-Host "Archive created: $zipPath ($((Get-Item $zipPath).Length) bytes)"
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Build installer
        id: installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $publishDir = "${{ steps.locate.outputs.publish_dir }}"

          iscc `
            /dAppVersion=$version `
            "/dPublishDir=$publishDir" `
            /O"$env:RUNNER_TEMP" `
            installer/installer.iss

          $setupPath = Join-Path $env:RUNNER_TEMP "BrightSync-Setup-v$version.exe"
          if (!(Test-Path $setupPath)) {
            throw "Setup executable was not created"
          }

          Write-Host "Installer created: $setupPath ($((Get-Item $setupPath).Length) bytes)"
          "setup_path=$setupPath" >> $env:GITHUB_OUTPUT

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --repo $env:GITHUB_REPOSITORY `
              --title $tag `
              --notes "Automated release for version $tag"
          }

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" `
            "${{ steps.archive.outputs.zip_path }}" `
            "${{ steps.installer.outputs.setup_path }}" `
            --repo $env:GITHUB_REPOSITORY `
            --clobber